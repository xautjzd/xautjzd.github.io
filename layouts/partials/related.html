{{ if .Site.RegularPages }}
{{ $related := .Site.RegularPages.Related . | first 5 }}
{{ if $related }}
<div class="related-posts">
  <h3>Related Posts</h3>
  <ul>
    {{ range $related }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <span class="meta">{{ .Date.Format "2006-01-02" }}</span>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
{{ end }}
